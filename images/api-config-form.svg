<svg viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="680" height="420" fill="#f8f6f2" rx="12"/>

  <!-- 左侧面板：原始请求 -->
  <rect x="30" y="55" width="280" height="320" fill="#ffffff" stroke="#e5e1da" stroke-width="1" rx="10"/>
  <text x="50" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#5a5a5a">原始 API 请求</text>

  <!-- 代码行示意 -->
  <rect x="50" y="105" width="240" height="16" fill="#f0ebe3" rx="4"/>
  <rect x="50" y="128" width="170" height="16" fill="#f0ebe3" rx="4"/>
  <rect x="50" y="151" width="210" height="16" fill="#f0ebe3" rx="4"/>
  <rect x="50" y="174" width="190" height="16" fill="#f0ebe3" rx="4"/>
  <rect x="50" y="197" width="230" height="16" fill="#f0ebe3" rx="4"/>
  <rect x="50" y="220" width="150" height="16" fill="#f0ebe3" rx="4"/>
  <rect x="50" y="243" width="200" height="16" fill="#f0ebe3" rx="4"/>

  <text x="50" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b8b8b">包含 Headers / Content-Type / Authorization</text>
  <text x="50" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b8b8b">还有 Body / model / messages / role</text>

  <!-- 中间箭头 -->
  <line x1="330" y1="215" x2="380" y2="215" stroke="#a89bc4" stroke-width="2"/>
  <polygon points="380,211 392,215 380,219" fill="#a89bc4"/>

  <!-- 中间标签 -->
  <rect x="312" y="188" width="100" height="55" fill="#a89bc4" rx="28"/>
  <text x="362" y="209" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#ffffff">智能体框架</text>
  <text x="362" y="227" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ffffff">帮你打包</text>

  <!-- 右侧面板：配置表单 -->
  <rect x="420" y="55" width="230" height="320" fill="#ffffff" stroke="#e5e1da" stroke-width="1" rx="10"/>
  <text x="440" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#5a5a5a">配置表单</text>

  <!-- 表单字段 -->
  <text x="440" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b8b8b">接口地址</text>
  <rect x="440" y="122" width="190" height="30" fill="#faf8f5" stroke="#d8d4cd" rx="5"/>
  <text x="448" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#999999">https://api.xxx.com/v1</text>

  <text x="440" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b8b8b">API Key</text>
  <rect x="440" y="179" width="190" height="30" fill="#faf8f5" stroke="#d8d4cd" rx="5"/>
  <text x="448" y="199" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#999999">sk-***</text>

  <text x="440" y="229" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b8b8b">模型名称</text>
  <rect x="440" y="236" width="190" height="30" fill="#faf8f5" stroke="#d8d4cd" rx="5"/>
  <text x="448" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#999999">gpt-4o-mini</text>

  <text x="440" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8b8b8b">高级配置</text>
  <rect x="440" y="295" width="14" height="14" fill="#6b8cae" rx="3"/>
  <text x="460" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666666">工具调用</text>
  <rect x="540" y="295" width="14" height="14" fill="none" stroke="#999999" rx="3"/>
  <text x="560" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#666666">思考模式</text>

  <!-- 底部说明 -->
  <text x="340" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666">很多底层细节（Headers / Content / Role）已经被框架封装好了</text>
</svg>