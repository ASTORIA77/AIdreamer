<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(120,110,90,0.06)"/>
    </filter>
    <marker id="dot" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4">
      <circle cx="5" cy="5" r="3" fill="#b8b0a4"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="320" y="30" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="17" font-weight="600" fill="#3d3a35">从 M×N 的泥潭，到 M+N 的电网</text>

  <!-- ========== 左侧：M×N 泥潭 ========== -->
  <text x="155" y="58" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" font-weight="600" fill="#8b7d6a">M×N 的泥潭</text>
  <text x="155" y="74" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#b0a89c">每个 Host 都要单独对接每个 Server</text>

  <!-- 左侧 Host 列 -->
  <rect x="35" y="95" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="35" y="135" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="35" y="175" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="35" y="215" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="70" y="112" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5a6d82">Host</text>
  <text x="70" y="152" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5a6d82">Host</text>
  <text x="70" y="192" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5a6d82">Host</text>
  <text x="70" y="232" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5a6d82">Host</text>

  <!-- 右侧 Server 列 -->
  <rect x="205" y="95" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="205" y="135" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="205" y="175" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="205" y="215" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="240" y="112" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5e7a6b">Server</text>
  <text x="240" y="152" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5e7a6b">Server</text>
  <text x="240" y="192" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5e7a6b">Server</text>
  <text x="240" y="232" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5e7a6b">Server</text>

  <!-- 交叉连接线条（4×4=16 条） -->
  <g stroke="#d4cdc1" stroke-width="1" opacity="0.7">
    <line x1="105" y1="108" x2="205" y2="108"/>
    <line x1="105" y1="108" x2="205" y2="148"/>
    <line x1="105" y1="108" x2="205" y2="188"/>
    <line x1="105" y1="108" x2="205" y2="228"/>

    <line x1="105" y1="148" x2="205" y2="108"/>
    <line x1="105" y1="148" x2="205" y2="148"/>
    <line x1="105" y1="148" x2="205" y2="188"/>
    <line x1="105" y1="148" x2="205" y2="228"/>

    <line x1="105" y1="188" x2="205" y2="108"/>
    <line x1="105" y1="188" x2="205" y2="148"/>
    <line x1="105" y1="188" x2="205" y2="188"/>
    <line x1="105" y1="188" x2="205" y2="228"/>

    <line x1="105" y1="228" x2="205" y2="108"/>
    <line x1="105" y1="228" x2="205" y2="148"/>
    <line x1="105" y1="228" x2="205" y2="188"/>
    <line x1="105" y1="228" x2="205" y2="228"/>
  </g>

  <!-- 左侧公式 -->
  <text x="155" y="275" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#8b7d6a">4 × 4 = 16</text>
  <text x="155" y="295" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#b0a89c">每新增一个 Host，要再连 4 条</text>

  <!-- 中间分隔线 -->
  <line x1="320" y1="55" x2="320" y2="305" stroke="#e8e3db" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="320" y="330" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="13" fill="#9a948a">协议层的价值：把二次方问题降成线性问题</text>

  <!-- ========== 右侧：M+N 电网 ========== -->
  <text x="485" y="58" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" font-weight="600" fill="#8b7d6a">M+N 的电网</text>
  <text x="485" y="74" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#b0a89c">大家都按 MCP 协议接同一个「插座」</text>

  <!-- 右侧 Host 列 -->
  <rect x="365" y="95" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="365" y="135" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="365" y="175" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="365" y="215" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="400" y="112" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5a6d82">Host</text>
  <text x="400" y="152" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5a6d82">Host</text>
  <text x="400" y="192" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5a6d82">Host</text>
  <text x="400" y="232" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5a6d82">Host</text>

  <!-- MCP 中心 -->
  <circle cx="485" cy="168" r="38" fill="#fdfbf7" stroke="#c9a876" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="162" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="13" font-weight="600" fill="#8b7d6a">MCP</text>
  <text x="485" y="178" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#b0a89c">统一协议</text>

  <!-- 右侧 Server 列 -->
  <rect x="535" y="95" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="535" y="135" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="535" y="175" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="535" y="215" width="70" height="26" rx="5" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="570" y="112" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5e7a6b">Server</text>
  <text x="570" y="152" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5e7a6b">Server</text>
  <text x="570" y="192" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5e7a6b">Server</text>
  <text x="570" y="232" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#5e7a6b">Server</text>

  <!-- Host → MCP 线条 -->
  <g stroke="#a8bdd1" stroke-width="1.2" opacity="0.85">
    <line x1="435" y1="108" x2="453" y2="145"/>
    <line x1="435" y1="148" x2="453" y2="158"/>
    <line x1="435" y1="188" x2="453" y2="178"/>
    <line x1="435" y1="228" x2="453" y2="191"/>
  </g>

  <!-- MCP → Server 线条 -->
  <g stroke="#8fb89c" stroke-width="1.2" opacity="0.85">
    <line x1="517" y1="145" x2="535" y2="108"/>
    <line x1="517" y1="158" x2="535" y2="148"/>
    <line x1="517" y1="178" x2="535" y2="188"/>
    <line x1="517" y1="191" x2="535" y2="228"/>
  </g>

  <!-- 右侧公式 -->
  <text x="485" y="275" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#8b7d6a">4 + 4 = 8</text>
  <text x="485" y="295" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#b0a89c">新增 Host 或 Server，只需多连 1 条</text>
</svg>