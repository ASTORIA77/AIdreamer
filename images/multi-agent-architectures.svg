<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(120,110,90,0.07)"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L8,5 L0,9 Z" fill="#b0a89c"/>
    </marker>
    <marker id="arrowup" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1,10 L5,2 L9,10 Z" fill="#a89bc4"/>
    </marker>
    <marker id="arrowdown" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1,0 L5,8 L9,0 Z" fill="#a89bc4"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="320" y="28" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="17" font-weight="600" fill="#3d3a35">多智能体的三种组织方式</text>

  <!-- 模式1：中心化 -->
  <rect x="18" y="52" width="194" height="200" rx="10" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="78" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" font-weight="600" fill="#5a6d82">中心化（主从式）</text>

  <!-- 中心 Agent -->
  <circle cx="115" cy="118" r="18" fill="#fdfbf7" stroke="#6b8cae" stroke-width="2"/>
  <text x="115" y="122" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" font-weight="600" fill="#5a6d82">主</text>

  <!-- 四个从 Agent -->
  <circle cx="55" cy="172" r="13" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2"/>
  <text x="55" y="176" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="8" fill="#5e7a6b">从</text>
  <circle cx="115" cy="190" r="13" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2"/>
  <text x="115" y="194" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="8" fill="#5e7a6b">从</text>
  <circle cx="175" cy="172" r="13" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2"/>
  <text x="175" y="176" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="8" fill="#5e7a6b">从</text>

  <line x1="115" y1="136" x2="55" y2="159" stroke="#a8bdd1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="115" y1="136" x2="115" y2="177" stroke="#a8bdd1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="115" y1="136" x2="175" y2="159" stroke="#a8bdd1" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="115" y="230" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#9a948a">一人分配，多人执行</text>

  <!-- 模式2：去中心化 -->
  <rect x="223" y="52" width="194" height="200" rx="10" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="78" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" font-weight="600" fill="#5e7a6b">去中心化（对等式）</text>

  <circle cx="280" cy="130" r="16" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.5"/>
  <text x="280" y="134" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" font-weight="600" fill="#5e7a6b">A</text>
  <circle cx="360" cy="130" r="16" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.5"/>
  <text x="360" y="134" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" font-weight="600" fill="#5e7a6b">B</text>
  <circle cx="280" cy="190" r="16" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.5"/>
  <text x="280" y="194" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" font-weight="600" fill="#5e7a6b">C</text>
  <circle cx="360" cy="190" r="16" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.5"/>
  <text x="360" y="194" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" font-weight="600" fill="#5e7a6b">D</text>

  <line x1="296" y1="130" x2="344" y2="130" stroke="#b0a89c" stroke-width="1"/>
  <line x1="280" y1="146" x2="280" y2="174" stroke="#b0a89c" stroke-width="1"/>
  <line x1="360" y1="146" x2="360" y2="174" stroke="#b0a89c" stroke-width="1"/>
  <line x1="296" y1="190" x2="344" y2="190" stroke="#b0a89c" stroke-width="1"/>
  <line x1="280" y1="146" x2="344" y2="190" stroke="#b0a89c" stroke-width="0.5" opacity="0.4"/>

  <text x="320" y="230" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#9a948a">人人平等，协商决定</text>

  <!-- 模式3：混合式 -->
  <rect x="428" y="52" width="194" height="200" rx="10" fill="#fdfbf7" stroke="#a89bc4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="525" y="78" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" font-weight="600" fill="#7d7390">混合式</text>

  <circle cx="525" cy="120" r="18" fill="#fdfbf7" stroke="#a89bc4" stroke-width="2"/>
  <text x="525" y="124" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" font-weight="600" fill="#7d7390">主</text>

  <circle cx="480" cy="160" r="13" fill="#fdfbf7" stroke="#a89bc4" stroke-width="1.2"/>
  <text x="480" y="164" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="8" fill="#7d7390">A</text>
  <circle cx="570" cy="160" r="13" fill="#fdfbf7" stroke="#a89bc4" stroke-width="1.2"/>
  <text x="570" y="164" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="8" fill="#7d7390">B</text>
  <line x1="510" y1="128" x2="480" y2="148" stroke="#b0a89c" stroke-width="1.2"/>
  <line x1="540" y1="128" x2="570" y2="148" stroke="#b0a89c" stroke-width="1.2"/>

  <circle cx="480" cy="202" r="11" fill="#fdfbf7" stroke="#c9a876" stroke-width="1.2"/>
  <text x="480" y="206" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="8" fill="#8b7d6a">C</text>
  <circle cx="570" cy="202" r="11" fill="#fdfbf7" stroke="#c9a876" stroke-width="1.2"/>
  <text x="570" y="206" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="8" fill="#8b7d6a">D</text>
  <line x1="480" y1="173" x2="480" y2="191" stroke="#b0a89c" stroke-width="0.8"/>
  <line x1="570" y1="173" x2="570" y2="191" stroke="#b0a89c" stroke-width="0.8"/>
  <line x1="493" y1="200" x2="557" y2="200" stroke="#e0dbd1" stroke-width="0.6"/>

  <text x="525" y="230" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#9a948a">主分配+A/B自行协商</text>
</svg>