<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(120,110,90,0.08)"/>
    </filter>
  </defs>

  <!-- 标题 -->
  <text x="320" y="30" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="17" font-weight="600" fill="#3d3a35">MCP 架构</text>

  <!-- MCP Host -->
  <rect x="235" y="50" width="170" height="52" rx="8" fill="#fdfbf7" stroke="#c9a876" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="72" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" font-weight="600" fill="#3d3a35">MCP Host</text>
  <text x="320" y="90" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" fill="#9a948a">你的 Agent 软件</text>

  <!-- 箭头 Host → Client -->
  <line x1="320" y1="102" x2="320" y2="122" stroke="#c9a876" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c9a876"/>
    </marker>
  </defs>

  <!-- MCP Client -->
  <rect x="245" y="122" width="150" height="44" rx="8" fill="#fdfbf7" stroke="#a8bdd1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="320" y="142" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="13" font-weight="600" fill="#3d3a35">MCP Client</text>
  <text x="320" y="157" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#9a948a">负责与 Server 通信</text>

  <!-- 三个箭头 client → servers -->
  <line x1="180" y1="166" x2="80" y2="204" stroke="#a8bdd1" stroke-width="1.2"/>
  <line x1="320" y1="166" x2="320" y2="204" stroke="#a8bdd1" stroke-width="1.2"/>
  <line x1="460" y1="166" x2="560" y2="204" stroke="#a8bdd1" stroke-width="1.2"/>

  <!-- 三个 Server -->
  <rect x="20" y="205" width="120" height="58" rx="7" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="80" y="226" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="12" font-weight="600" fill="#3d3a35">MCP Server</text>
  <text x="80" y="243" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#9a948a">GitHub</text>
  <text x="80" y="256" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#bbb">Issue · PR · Repo</text>

  <rect x="260" y="205" width="120" height="58" rx="7" fill="#fdfbf7" stroke="#a89bc4" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="320" y="226" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="12" font-weight="600" fill="#3d3a35">MCP Server</text>
  <text x="320" y="243" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#9a948a">文件系统</text>
  <text x="320" y="256" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#bbb">Read · Write</text>

  <rect x="500" y="205" width="120" height="58" rx="7" fill="#fdfbf7" stroke="#c9a876" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="560" y="226" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="12" font-weight="600" fill="#3d3a35">MCP Server</text>
  <text x="560" y="243" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#9a948a">数据库</text>
  <text x="560" y="256" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#bbb">Query · SQL</text>

  <!-- 底部标注 -->
  <line x1="80" y1="280" x2="560" y2="280" stroke="#efeae0" stroke-width="1"/>
  <text x="320" y="302" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="12" fill="#9a948a">JSON-RPC 2.0 通信</text>
</svg>
