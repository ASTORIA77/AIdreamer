<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(120,110,90,0.08)"/>
    </filter>
  </defs>

  <!-- 标题 -->
  <text x="300" y="36" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="18" font-weight="600" fill="#3d3a35">Context = 模型看到的全部</text>
  <text x="300" y="58" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="12" fill="#9a948a">不只是 prompt，是所有这些加在一起</text>

  <!-- 外圈虚线轨道 -->
  <circle cx="300" cy="250" r="155" fill="none" stroke="#e8e2d8" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- 中心圆：Context -->
  <circle cx="300" cy="250" r="52" fill="#fdfbf7" stroke="#c9a876" stroke-width="2" filter="url(#softShadow)"/>
  <text x="300" y="240" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="14" font-weight="600" fill="#c9a876">Context</text>
  <text x="300" y="258" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#9a948a">语义背景</text>
  <text x="300" y="274" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="10" fill="#9a948a">上下文</text>

  <!-- 7 个卫星节点：用三角函数均匀分布 -->
  <!-- 1. 系统提示词 (top) -->
  <g>
    <circle cx="300" cy="95" r="36" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="300" y="90" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" font-weight="600" fill="#5a7d9e">系统提示词</text>
    <text x="300" y="106" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#9a948a">角色·规则·红线</text>
  </g>
  <line x1="300" y1="198" x2="300" y2="131" stroke="#6b8cae" stroke-width="1" opacity="0.4"/>

  <!-- 2. 记忆系统 (top right) -->
  <g>
    <circle cx="435" cy="138" r="36" fill="#fdfbf7" stroke="#a89bc4" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="435" y="133" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" font-weight="600" fill="#7a6e9a">记忆系统</text>
    <text x="435" y="149" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#9a948a">偏好·历史·习惯</text>
  </g>
  <line x1="342" y1="211" x2="408" y2="160" stroke="#a89bc4" stroke-width="1" opacity="0.4"/>

  <!-- 3. 知识库 (right) -->
  <g>
    <circle cx="490" cy="250" r="36" fill="#fdfbf7" stroke="#c9a876" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="490" y="245" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" font-weight="600" fill="#9a7a45">知识库</text>
    <text x="490" y="261" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#9a948a">个人资料库</text>
  </g>
  <line x1="352" y1="250" x2="454" y2="250" stroke="#c9a876" stroke-width="1" opacity="0.4"/>

  <!-- 4. 上传附件 (bottom right) -->
  <g>
    <circle cx="435" cy="362" r="36" fill="#fdfbf7" stroke="#6b8cae" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="435" y="357" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" font-weight="600" fill="#5a7d9e">上传附件</text>
    <text x="435" y="373" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#9a948a">PDF·Word·Excel</text>
  </g>
  <line x1="342" y1="289" x2="408" y2="340" stroke="#6b8cae" stroke-width="1" opacity="0.4"/>

  <!-- 5. 工作空间文件 (bottom) -->
  <g>
    <circle cx="300" cy="405" r="36" fill="#fdfbf7" stroke="#8fb89c" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="300" y="400" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" font-weight="600" fill="#5e8f6b">工作空间文件</text>
    <text x="300" y="416" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#9a948a">目录里的所有文件</text>
  </g>
  <line x1="300" y1="302" x2="300" y2="369" stroke="#8fb89c" stroke-width="1" opacity="0.4"/>

  <!-- 6. 工具和 MCP (bottom left) -->
  <g>
    <circle cx="165" cy="362" r="36" fill="#fdfbf7" stroke="#a89bc4" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="165" y="357" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" font-weight="600" fill="#7a6e9a">工具 / MCP</text>
    <text x="165" y="373" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#9a948a">API·数据库·平台</text>
  </g>
  <line x1="258" y1="289" x2="192" y2="340" stroke="#a89bc4" stroke-width="1" opacity="0.4"/>

  <!-- 7. 技能 (top left) -->
  <g>
    <circle cx="110" cy="250" r="36" fill="#fdfbf7" stroke="#c9a876" stroke-width="1.5" filter="url(#softShadow)"/>
    <text x="110" y="245" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="11" font-weight="600" fill="#9a7a45">技能 Skills</text>
    <text x="110" y="261" text-anchor="middle" font-family="'Noto Sans SC', sans-serif" font-size="9" fill="#9a948a">可复用工作流</text>
  </g>
  <line x1="248" y1="250" x2="146" y2="250" stroke="#c9a876" stroke-width="1" opacity="0.4"/>
</svg>
