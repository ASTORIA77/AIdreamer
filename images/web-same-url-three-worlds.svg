<svg viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg">
  <style>text{font-family:'Noto Serif SC','Noto Sans SC',serif;}</style>

  <text x="360" y="22" text-anchor="middle" font-size="13" fill="#8a8376">同一个 B 站搜索页面，三种工具看到了什么？</text>

  <rect x="25" y="40" width="210" height="180" rx="8" fill="#fdf8f0" stroke="#c9a876" stroke-width="1.5"/>
  <rect x="25" y="40" width="210" height="30" rx="8" fill="#c9a876"/>
  <rect x="25" y="58" width="210" height="12" fill="#c9a876"/>
  <text x="130" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">WebSearch</text>
  <rect x="45" y="88" width="170" height="16" rx="3" fill="#f5ede0"/>
  <text x="130" y="100" text-anchor="middle" font-size="10" fill="#a08060">CSDN 博客：Transformer教程</text>
  <text x="45" y="130" font-size="11" fill="#b8a080">只有标题和两行摘要</text>
  <text x="45" y="150" font-size="11" fill="#b8a080">没有弹幕数、没有视频</text>
  <text x="45" y="175" font-size="11" fill="#b8a080">连 B 站页面都没打开</text>
  <text x="130" y="210" text-anchor="middle" font-size="10" fill="#ccc">摘要</text>

  <rect x="255" y="40" width="210" height="180" rx="8" fill="#edf3f9" stroke="#6b8cae" stroke-width="1.5"/>
  <rect x="255" y="40" width="210" height="30" rx="8" fill="#6b8cae"/>
  <rect x="255" y="58" width="210" height="12" fill="#6b8cae"/>
  <text x="360" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">WebFetch</text>
  <rect x="275" y="88" width="170" height="50" rx="3" fill="#e0e8f2"/>
  <text x="360" y="108" text-anchor="middle" font-size="13" fill="#b06060">验证码页面</text>
  <text x="360" y="128" text-anchor="middle" font-size="10" fill="#8098b0">请完成滑块验证</text>
  <text x="275" y="158" font-size="11" fill="#8098b0">没有 Cookie 被挡在门外</text>
  <text x="275" y="178" font-size="11" fill="#8098b0">HTML 里只有空 div</text>
  <text x="275" y="198" font-size="11" fill="#8098b0">视频列表由 JS 渲染</text>
  <text x="360" y="210" text-anchor="middle" font-size="10" fill="#ccc">空</text>

  <rect x="485" y="40" width="210" height="180" rx="8" fill="#eef6f0" stroke="#8fb89c" stroke-width="1.5"/>
  <rect x="485" y="40" width="210" height="30" rx="8" fill="#8fb89c"/>
  <rect x="485" y="58" width="210" height="12" fill="#8fb89c"/>
  <text x="590" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">WebBridge</text>
  <rect x="505" y="85" width="170" height="14" rx="3" fill="#d8e9dd"/>
  <text x="590" y="95" text-anchor="middle" font-size="10" fill="#508060">视频1：Transformer精讲 ▸ 12.3万弹幕</text>
  <rect x="505" y="105" width="140" height="14" rx="3" fill="#d8e9dd"/>
  <text x="575" y="115" text-anchor="middle" font-size="10" fill="#508060">视频2：动手学Transformer ▸ 8.7万</text>
  <rect x="505" y="125" width="120" height="14" rx="3" fill="#d8e9dd"/>
  <text x="565" y="135" text-anchor="middle" font-size="10" fill="#508060">视频3：从零实现 ▸ 5.2万</text>
  <text x="505" y="158" font-size="11" fill="#508060">完整的视频列表</text>
  <text x="505" y="178" font-size="11" fill="#508060">每个视频的弹幕数和播放量</text>
  <text x="505" y="198" font-size="11" fill="#508060">可以点击排序、截屏提取</text>
  <text x="590" y="210" text-anchor="middle" font-size="10" fill="#ccc">完整</text>
</svg>